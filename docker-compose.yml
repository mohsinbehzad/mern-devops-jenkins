version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: taskmanager-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: taskmanager-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/taskmanager
      JWT_SECRET: supersecretjwtkey123
      PORT: 5000
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: taskmanager-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data:
